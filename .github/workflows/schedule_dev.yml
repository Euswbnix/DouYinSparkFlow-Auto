# 此工作流用于运行dev（测试）分支的定时任务，如果不清楚请使用 DouYin Spark Flow Schedule Run

name: 【dev（测试）分支】DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: "0 1 * * *" # 每天 1:00 UTC（对应北京时间 9:00）
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
      with:
        ref: dev
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - name: Roll refreshed cookies back to secrets
      # 滚动 cookie：把本次成功登录后抖音轮换出的最新 cookie 回写到密钥，供下次运行接力。
      if: ${{ !cancelled() }}
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "未配置 GH_PAT，跳过 cookie 回写（滚动 cookie 未启用）"; exit 0
        fi
        if ! ls cookie_refresh/*.json >/dev/null 2>&1; then
          echo "本次没有成功登录的账号，无 cookie 需要回写"; exit 0
        fi
        for f in cookie_refresh/*.json; do
          name=$(basename "$f" .json)
          echo "回写密钥 $name ..."
          gh secret set "$name" --env user-data --repo "$GITHUB_REPOSITORY" < "$f"
        done
        echo "cookie 回写完成"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1