name: DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  # [已停用 2026-07] 抖音改版把私信 IM 迁入内嵌 iframe 且做了反自动化，云端无法加载会话，
  # 定时任务只会每天失败。暂停 cron，保留手动触发。要恢复请取消下面注释。
  # schedule:
  #   - cron: "30 16 * * *" # 每天 16:30 UTC（对应北京时间 00:30）
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - name: Roll refreshed cookies back to secrets
      # 滚动 cookie：把本次成功登录后抖音轮换出的最新 cookie 回写到密钥，供下次运行接力。
      # 即使上一步以非零码退出（有账号失败），成功账号的新 cookie 仍要回写，故用 !cancelled()。
      if: ${{ !cancelled() }}
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "未配置 GH_PAT，跳过 cookie 回写（滚动 cookie 未启用）"; exit 0
        fi
        if ! ls cookie_refresh/*.json >/dev/null 2>&1; then
          echo "本次没有成功登录的账号，无 cookie 需要回写"; exit 0
        fi
        for f in cookie_refresh/*.json; do
          name=$(basename "$f" .json)
          echo "回写密钥 $name ..."
          gh secret set "$name" --env user-data --repo "$GITHUB_REPOSITORY" < "$f"
        done
        echo "cookie 回写完成"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
